<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background: linear-gradient(135deg, #121212, #1a1a2e);
            color: white; font-family: sans-serif; margin: 0; padding: 20px;
        }
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px; padding: 20px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
            margin-bottom: 20px;
        }
        .profile { display: flex; align-items: center; gap: 15px; }
        .profile img { width: 50px; height: 50px; border-radius: 50%; background: #333; }
        .admin-panel { display: none; border: 1px dashed #0088cc; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .card {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 15px; padding: 15px; text-align: center;
        }
        button {
            background: #0088cc; color: white; border: none; 
            padding: 12px; border-radius: 10px; width: 100%; cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="glass profile">
        <img id="avatar" src="">
        <div>
            <b id="name">Загрузка...</b>
            <div style="font-size: 12px; opacity: 0.6;">Telegram Web App</div>
        </div>
    </div>

    <div id="admin-ui" class="glass admin-panel">
        <input type="file" id="fileInp" style="display:none">
        <button onclick="document.getElementById('fileInp').click()">ВЫБРАТЬ И ЗАГРУЗИТЬ</button>
    </div>

    <div class="grid" id="grid">
        </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const MY_ID = ТВОЙ_ТГ_ID; // <--- ЗАМЕНИ НА СВОЙ ID (цифрами)
        const user = tg.initDataUnsafe.user;

        if (user) {
            document.getElementById('name').innerText = user.first_name;
            if (user.photo_url) document.getElementById('avatar').src = user.photo_url;
            if (user.id === MY_ID) document.getElementById('admin-ui').style.display = 'block';
        }

        async function refresh() {
            const r = await fetch('/api/files');
            const files = await r.json();
            const g = document.getElementById('grid');
            g.innerHTML = files.map(f => `
                <div class="card">
                    <div style="font-size: 40px;">📄</div>
                    <div style="font-size: 12px; margin-top: 5px;">${f.name}</div>
                </div>
            `).join('');
        }

        document.getElementById('fileInp').onchange = async (e) => {
            const f = e.target.files[0];
            if (!f) return;
            const fd = new FormData();
            fd.append('file', f);
            await fetch('/upload', { method: 'POST', body: fd });
            refresh();
            tg.showAlert("Файл успешно загружен, братан!");
        };

        refresh();
    </script>
</body>
</html>
